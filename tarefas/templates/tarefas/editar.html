{% extends 'tarefas/base.html' %}

{% block title %}Editar Tarefa{% endblock %}

{% block content %}

<h1>Editar Tarefa</h1>

<form method="post">
    {% csrf_token %}

    <label>Título:</label>
    <input type="text" name="titulo" value="{{ tarefa.titulo }}" required>
    <br>

    <label>Descrição:</label>
    <textarea name="descricao">{{ tarefa.descricao }}</textarea>
    <br>

    <label>Finalizado</label>
    <input type="checkbox" name="finalizado" {% if tarefa.finalizado %}checked{% endif %}>
    <br>

    <button type="submit">Salvar alterações</button>
</form>

<p>
    <a href="{% url 'listar_tarefas' %}">Voltar</a>
</p>

{% endblock %}
